{% extends template.self %}

{% block head %}
    {{ super() }}
    <script>!function(){var m=document.querySelector('meta[name="viewport"]');m&&m.content.indexOf('viewport-fit')<0&&(m.content+=',viewport-fit=cover')}()</script>
    <link rel="stylesheet" href="{{ "styles/custom.css"|resolveFile }}">
{% endblock %}

{% block javascript %}
    {{ super() }}
    <script src="{{ "scripts/table-scroll-hints.js"|resolveFile }}"></script>
    <script src="{{ "scripts/share-links.js"|resolveFile }}"></script>
    <script src="{{ "scripts/image-performance.js"|resolveFile }}"></script>
    <script src="{{ "scripts/image-lightbox.js"|resolveFile }}"></script>
    <script src="{{ "scripts/back-to-top.js"|resolveFile }}"></script>
    <script src="{{ "scripts/toc-toggle.js"|resolveFile }}"></script>
    <script src="{{ "scripts/swipe-navigation.js"|resolveFile }}"></script>
    <script src="{{ "scripts/scroll-memory.js"|resolveFile }}"></script>
    <script src="{{ "scripts/reading-progress.js"|resolveFile }}"></script>
{% endblock %}
